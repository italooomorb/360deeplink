<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RED360</title>
    <style>
        body { text-align: center; font-family: sans-serif; margin-top: 50px; }
        .botao { 
            background-color: #007BFF; color: white; border: none; 
            padding: 15px 30px; font-size: 18px; border-radius: 8px; cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h2>RED360</h2>
    <p>Clique abaixo para continuar.</p>

    <button class="botao" onclick="tentarAbrirApp()">Abrir no Aplicativo</button>

    <script>
        function tentarAbrirApp() {
            // O link do seu app
            var appUrl = "meuapp://pagamento/123"; 
            
            // O link da loja (coloque o link real aqui)
            var storeUrl = "https://play.google.com/store/apps/details?id=com.suaempresa.seuapp";

            // 1. Dispara a tentativa de abrir o app
            window.location.href = appUrl;

            // 2. Inicia o cronômetro para ir para a loja caso o app não abra
            setTimeout(function() {
                window.location.href = storeUrl;
            }, 2000); // 2 segundos
        }
    </script>
</body>
</html>
