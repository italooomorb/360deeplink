<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abrir App</title>
    <style>
        body { text-align: center; font-family: sans-serif; margin-top: 50px; }
        .botao { 
            background-color: #007BFF; color: white; border: none; 
            padding: 15px 30px; font-size: 18px; border-radius: 8px; cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h2>Você tem o nosso aplicativo?</h2>
    <p>Clique abaixo para continuar.</p>

    <button class="botao" onclick="tentarAbrirApp()">Abrir no Aplicativo</button>

    <script>
        function tentarAbrirApp() {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            
            // Variáveis de Loja corrigidas
            var androidStoreUrl = "https://play.google.com/store/apps/details?id=app.red360";
            var iosStoreUrl = "https://apps.apple.com/br/app/seu-app/id123456789"; // Troque pelo seu ID da Apple
            var siteUrl = "https://www.dimensiva.com.br";

            // Se for ANDROID, usamos a técnica mágica do Intent
            if (/android/i.test(userAgent)) {
                // O formato Intent do Android (Ele mesmo tenta abrir o app, ou joga pra loja automaticamente)
                var intentUrl = "intent://biblioteca/123#Intent;scheme=red360;package=app.red360;end;";
                window.location.href = intentUrl;
            } 
            // Se for iOS (iPhone/iPad), usamos o esquema normal
            else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                var iosAppUrl = "meuapp://pagamento/123";
                window.location.href = iosAppUrl;
                
                // O cronômetro agora roda APENAS para iOS (já que o Intent do Android resolve sozinho)
                setTimeout(function() {
                    window.location.replace(iosStoreUrl);
                }, 2000);
            } 
            // Se for Computador/Desktop
            else {
                window.location.replace(siteUrl);
            }
        }
    </script>
</body>
</html>
